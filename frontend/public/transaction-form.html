<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Add Transaction - Expense Tracker</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
    <span class="brand">Expense Tracker</span>
    <a href="index.html">Dashboard</a>
    <a href="transactions.html">Transactions</a>
    <a href="transaction-form.html" class="active">Add Transaction</a>
</nav>

<main>
    <h1 id="formTitle">Add Transaction</h1>

    <p id="errorBox" class="error" style="display:none;"></p>

    <form id="transactionForm">
        <label>Type
            <select id="type" name="type">
                <option value="">-- Select --</option>
                <option value="INCOME">INCOME</option>
                <option value="EXPENSE">EXPENSE</option>
            </select>
        </label>

        <label>Category
            <input type="text" id="category" name="category" placeholder="e.g. Groceries, Salary, Rent">
        </label>

        <label>Amount
            <input type="number" id="amount" name="amount" step="0.01" min="0.01" placeholder="0.00">
        </label>

        <label>Date
            <input type="date" id="date" name="date">
        </label>

        <label>Description
            <input type="text" id="description" name="description" placeholder="Optional note">
        </label>

        <button type="submit" id="submitBtn">Add Transaction</button>
        <a href="transactions.html">Cancel</a>
    </form>

</main>

<script src="js/transaction-form.js"></script>
</body>
</html>
